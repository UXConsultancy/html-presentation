        y1="300"

      <line

        stroke="rgba(168,179,208,0.08)"

      />

        x2="1000"

        y1="500"
        x2="600"
        y2="400"

        x1="700"
        y1="600"

        y2="500"

  <div class="container">
    <div class="hero__content">
      <p class="hero__label mono" data-reveal>Label</p>
      <h1 class="hero__title" data-reveal>

      </h1>
      <p class="hero__subtitle" data-reveal>
        Subtitle. A supporting sentence or two that expands on the headline and
        sets the context for the rest of the presentation.
      </p>
    </div>
  </div>
  <div class="hero__scroll" aria-hidden="true">
    <span>Scroll or press <kbd>&darr;</kbd></span>
  </div>
</section>
