<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PROJECT_NAME}}</title>
    <meta name="description" content="{{PROJECT_NAME}}" />
    <meta property="og:title" content="{{PROJECT_NAME}}" />
    <meta property="og:description" content="{{PROJECT_NAME}}" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0F1229" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manuale:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- PASSWORD_GATE_START -->
    <div id="password-gate" class="password-gate">
      <div class="password-gate__inner">
        <svg
          class="password-gate__logo"
          viewBox="0 0 200 40"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <text
            x="0"
            y="30"
            fill="#fff"
            font-family="Inter, sans-serif"
            font-size="24"
            font-weight="600"
          >
            LOGO
          </text>
        </svg>
        <p class="password-gate__label">Enter password to continue</p>
        <form id="password-form" class="password-gate__form" autocomplete="off">
          <input
            id="password-input"
            class="password-gate__input"
            type="password"
            placeholder="Password"
            required
          />
          <button type="submit" class="password-gate__btn">Enter</button>
        </form>
        <p id="password-error" class="password-gate__error" hidden>
          Incorrect password
        </p>
      </div>
    </div>
    <!-- PASSWORD_GATE_END -->

    <!-- ======== Site Logo ======== -->
    <a href="#hero" class="site-logo" aria-label="Back to top">
      <span class="site-logo__light">
        <svg
          viewBox="0 0 200 40"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <text
            x="0"
            y="30"
            fill="currentColor"
            font-family="Inter, sans-serif"
            font-size="24"
            font-weight="600"
          >
            LOGO
          </text>
        </svg>
      </span>
      <span class="site-logo__dark">
        <svg
          viewBox="0 0 200 40"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <text
            x="0"
            y="30"
            fill="currentColor"
            font-family="Inter, sans-serif"
            font-size="24"
            font-weight="600"
          >
            LOGO
          </text>
        </svg>
      </span>
    </a>

    <!-- ======== Progress Rail ======== -->
    <nav class="progress-rail" aria-label="Page progress">
      <div class="progress-rail__track">
        <div class="progress-rail__fill"></div>
      </div>
      <ol class="progress-rail__nodes">
        <!-- PROGRESS_RAIL_NODES -->
      </ol>
    </nav>

    <!-- SECTIONS_START -->
    <!-- SECTIONS_END -->

    <script src="script.js"></script>
  </body>
</html>
